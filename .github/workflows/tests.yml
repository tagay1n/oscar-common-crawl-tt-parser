name: Tests

on:
  push:
    branches:
      - main

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Rust source
        id: rust-src
        run: |
          if [ -f cc-downloader-source/Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "cc-downloader-source/Cargo.toml not found; skipping Rust tests."
          fi

      - name: Set up Rust
        if: steps.rust-src.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        if: steps.rust-src.outputs.present == 'true'
        run: |
          cargo test --manifest-path cc-downloader-source/Cargo.toml
